version: '3.8'
services:
  backend:
    build: ./backend
    container_name: sigma-backend
    ports:
      - '8000:8000'
    environment:
      - JWT_SECRET=replace_with_strong_secret_before_demo
      - ENVIRONMENT=production
    volumes:
      - ./backend/app/data:/app/data:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
  frontend:
    build: ./frontend
    container_name: sigma-frontend
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000
networks:
  default:
    name: sigma-lab-network
